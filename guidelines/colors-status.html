<!-- @dsCard group="Colors" viewport="700x110" name="Status Colors" subtitle="Verified / unverified — the only two states that matter on the map" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex;gap:12px;height:110px;align-items:center;font-family:var(--font-body);padding:0 4px">
<span style="font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;letter-spacing:0.04em;font-weight:700;padding:3px 8px;border-radius:2px;background:var(--status-verified);color:var(--white)">Verified</span>
<span style="font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;letter-spacing:0.04em;font-weight:700;padding:3px 8px;border-radius:2px;background:var(--status-unverified);color:var(--white)">Unverified</span>
<span style="font-family:var(--font-mono);font-size:9.5px;text-transform:uppercase;letter-spacing:0.04em;font-weight:700;padding:3px 8px;border-radius:2px;background:var(--ink-soft);color:var(--white)">Seasonal</span>
<span style="font-size:12px;color:var(--ink-soft)">— badges are small, mono, uppercase, high-contrast fills. Never outline-only.</span>
</div>

<!-- @dsCard group="Colors" viewport="700x150" name="Core Palette" subtitle="Paper, ink, and the three accent colors" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex;height:150px;font-family:var(--font-body)">
<div style="flex:1;background:var(--paper);display:flex;align-items:flex-end;padding:8px;font-family:var(--font-mono);font-size:10px;color:var(--ink)">paper<br>#EDE6D6</div>
<div style="flex:1;background:var(--paper-dark);display:flex;align-items:flex-end;padding:8px;font-family:var(--font-mono);font-size:10px;color:var(--ink)">paper-dark<br>#E2D9C4</div>
<div style="flex:1;background:var(--ink);display:flex;align-items:flex-end;padding:8px;font-family:var(--font-mono);font-size:10px;color:var(--white)">ink<br>#2B2A26</div>
<div style="flex:1;background:var(--ink-soft);display:flex;align-items:flex-end;padding:8px;font-family:var(--font-mono);font-size:10px;color:var(--white)">ink-soft<br>#5B5648</div>
<div style="flex:1;background:var(--white);display:flex;align-items:flex-end;padding:8px;font-family:var(--font-mono);font-size:10px;color:var(--ink);border-left:1px solid var(--line)">white<br>#FBF9F3</div>
<div style="flex:1;background:var(--rust);display:flex;align-items:flex-end;padding:8px;font-family:var(--font-mono);font-size:10px;color:var(--white)">rust<br>#B5502C</div>
</div>

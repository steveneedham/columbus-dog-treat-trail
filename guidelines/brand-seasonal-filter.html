<!-- @dsCard group="Brand" viewport="700x160" name="Seasonal Map Filter" subtitle="Intentional addition — winter vs. summer tile treatments, same 'aged paper' logic as the base filter" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex;gap:14px;height:160px;font-family:var(--font-mono);font-size:10px;color:var(--ink-soft)">
<div style="flex:1;background:linear-gradient(135deg,var(--paper-dark),var(--paper));filter:saturate(0.9) sepia(8%) brightness(1.02);display:flex;align-items:flex-end;padding:8px;border:1px solid var(--line)">summer (current)<br>saturate(.9) sepia(8%) brightness(1.02)</div>
<div style="flex:1;background:linear-gradient(135deg,#DDE3E6,#EEF1F2);filter:saturate(0.5) brightness(1.08) contrast(0.95);display:flex;align-items:flex-end;padding:8px;border:1px solid var(--line);color:var(--ink)">winter<br>saturate(.5) brightness(1.08) contrast(.95)</div>
<div style="flex:1;background:linear-gradient(135deg,#E7DCC0,#F1E6CC);filter:saturate(1.05) sepia(18%) brightness(1.03);display:flex;align-items:flex-end;padding:8px;border:1px solid var(--line);color:var(--ink)">autumn<br>saturate(1.05) sepia(18%) brightness(1.03)</div>
</div>

<!-- @dsCard group="Brand" viewport="700x170" name="Map Empty / Loading States" subtitle="Intentional addition — no pins in view, GPS permission denied, offline" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex;gap:14px;height:170px;font-family:var(--font-body);font-size:12px;color:var(--ink-soft)">
<div style="flex:1;background:var(--white);border:1.5px solid var(--ink);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px;text-align:center">
<img src="../assets/icons/map-pin.svg" style="width:26px;height:26px;opacity:0.5">
<div>No stops in view yet<br><span style="font-family:var(--font-mono);font-size:10px">pan or zoom out to find one</span></div>
</div>
<div style="flex:1;background:var(--white);border:1.5px solid var(--ink);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px;text-align:center">
<img src="../assets/icons/near-me.svg" style="width:26px;height:26px;opacity:0.5">
<div>Location access denied<br><span style="font-family:var(--font-mono);font-size:10px">enable it in your browser settings</span></div>
</div>
<div style="flex:1;background:var(--white);border:1.5px solid var(--ink);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px;text-align:center">
<span style="font-size:22px;opacity:0.5">⟳</span>
<div>You're offline<br><span style="font-family:var(--font-mono);font-size:10px">showing the last-loaded stops</span></div>
</div>
</div>

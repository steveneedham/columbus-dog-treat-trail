<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Stop QR Cards" description="Printable sheet of scannable QR cards to post at physical trail stops" -->
<helmet>
<script src="./ds-base.js"></script>
<script src="./doc-page.js"></script>
<style>doc-page:not(:defined){visibility:hidden}
.qr-grid{width:100%;height:100%;display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(3,1fr);padding:0.4in}
.qr-card{border:1.5px dashed var(--ink-soft);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:18px 14px;position:relative}
.qr-mark{width:34px;height:34px}
.qr-name{font-family:var(--font-display);font-weight:700;font-size:16px;text-align:center;color:var(--ink);margin:0}
.qr-label{font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-soft);text-align:center}
.qr-box{width:118px;height:118px;background:var(--white);border:1.5px solid var(--ink);border-radius:4px;display:flex;align-items:center;justify-content:center;padding:8px}
.qr-url{font-family:var(--font-mono);font-size:8.5px;color:var(--ink-soft);text-align:center}
.qr-type{font-family:var(--font-mono);font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:2px 8px;border-radius:999px;color:var(--white)}
.qr-type.type-treat_stand{background:var(--rust)}
.qr-type.type-stick_library{background:var(--moss)}
.qr-type.type-water_bowl{background:var(--water,#3E6E8E)}
.qr-type.type-toy_box{background:var(--purple,#8A5FB0)}
.qr-type.type-mixed{background:var(--amber)}
</style>
</helmet>
<doc-page size="letter">
<section class="page">
<div class="qr-grid">
<sc-for list="{{ stops }}" as="stop" hint-placeholder-count="6">
<div class="qr-card">
<img class="qr-mark" src="../../assets/mascot/scout-mark.svg" alt="">
<div class="qr-name">{{ stop.name }}</div>
<div class="qr-type type-{{ stop.type }}">{{ stop.typeLabel }}</div>
<div class="qr-label">Scan to see this stop</div>
<div class="qr-box" ref="{{ stop.qrRef }}"></div>
<div class="qr-url">{{ stop.url }}</div>
</div>
</sc-for>
</div>
</section>
</doc-page>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  stops = [
    { name: 'Lost & Hound', type: 'treat_stand', typeLabel: 'Treat stand', url: 'treattrail.example/s/lost-and-hound', qrRef: React.createRef() },
    { name: 'German Village Stash', type: 'treat_stand', typeLabel: 'Treat stand', url: 'treattrail.example/s/german-village', qrRef: React.createRef() },
    { name: 'Schiller Park Sticks', type: 'stick_library', typeLabel: 'Stick library', url: 'treattrail.example/s/schiller-park', qrRef: React.createRef() },
    { name: "Book Loft Water Bowl", type: 'water_bowl', typeLabel: 'Water bowl', url: 'treattrail.example/s/book-loft', qrRef: React.createRef() },
    { name: 'Whittier St Toy Box', type: 'toy_box', typeLabel: 'Toy box', url: 'treattrail.example/s/whittier-st', qrRef: React.createRef() },
    { name: 'Merion Village Mix', type: 'mixed', typeLabel: 'Mixed stop', url: 'treattrail.example/s/merion-village', qrRef: React.createRef() }
  ];

  componentDidMount() {
    const render = () => {
      this.stops.forEach(s => {
        if (s.qrRef.current && !s.qrRef.current.dataset.rendered) {
          s.qrRef.current.dataset.rendered = '1';
          new window.QRCode(s.qrRef.current, { text: 'https://' + s.url, width: 100, height: 100, colorDark: '#2B2A26', colorLight: '#FBF9F3', correctLevel: window.QRCode.CorrectLevel.M });
        }
      });
    };
    if (window.QRCode) { render(); return; }
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    script.onload = render;
    document.head.appendChild(script);
  }

  renderVals() {
    return { stops: this.stops };
  }
}

</script>
</body>
</html>

<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>body{margin:0;background:#fff}canvas{display:block;margin:0 auto}</style></head>
<body>
<div id="out"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const params = new URLSearchParams(location.search);
const file = params.get('f');
pdfjsLib.getDocument(file).promise.then(async pdf => {
  const out = document.getElementById('out');
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 1.5 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    out.appendChild(canvas);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  }
  document.title = 'done-' + pdf.numPages;
}).catch(e => { document.body.innerText = 'ERROR: ' + e.message; });
</script>
</body></html>

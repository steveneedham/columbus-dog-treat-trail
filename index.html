<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Columbus Dog Treat Trail</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EDE6D6;
    --paper-dark:#E2D9C4;
    --ink:#2B2A26;
    --ink-soft:#5B5648;
    --rust:#B5502C;
    --moss:#4C6B4F;
    --amber:#C68A2E;
    --line:#C9BFA5;
    --white:#FBF9F3;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:'Inter',sans-serif;color:var(--ink);background:var(--paper);}

  #map{position:absolute; inset:0; filter:saturate(0.9);}

  .leaflet-tile-pane{ filter: sepia(8%) saturate(85%) brightness(1.02); }

  /* Top bar */
  .topbar{
    position:absolute; top:0; left:0; right:0; z-index:1000;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px;
    background:linear-gradient(180deg, rgba(237,230,214,0.97) 0%, rgba(237,230,214,0.88) 80%, rgba(237,230,214,0) 100%);
    pointer-events:none;
  }
  .topbar > *{ pointer-events:auto; }
  .brand{ display:flex; align-items:baseline; gap:10px; }
  .brand h1{
    font-family:'Fraunces', serif; font-weight:700; font-size:22px; margin:0;
    letter-spacing:-0.01em;
  }
  .brand .paw{ font-size:20px; transform: rotate(-8deg); display:inline-block; }
  .brand .subtitle{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--ink-soft);
    text-transform:uppercase; letter-spacing:0.08em;
  }
  .actions{ display:flex; gap:8px; }
  .btn{
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600;
    padding:9px 14px; border-radius:3px; border:1.5px solid var(--ink);
    background:var(--white); color:var(--ink); cursor:pointer;
    display:flex; align-items:center; gap:6px;
    transition: transform 0.12s ease, background 0.12s ease;
  }
  .btn:hover{ background:var(--ink); color:var(--white); }
  .btn:active{ transform: scale(0.97); }
  .btn.primary{ background:var(--rust); color:var(--white); border-color:var(--rust); }
  .btn.primary:hover{ background:#96401F; border-color:#96401F; }

  /* Filter chips */
  .filters{
    position:absolute; top:70px; left:20px; z-index:1000;
    display:flex; flex-direction:column; gap:6px;
    background:var(--white); border:1.5px solid var(--ink); border-radius:4px;
    padding:10px; box-shadow:2px 2px 0 rgba(43,42,38,0.15);
  }
  .filters .label{
    font-family:'JetBrains Mono', monospace; font-size:10px; text-transform:uppercase;
    letter-spacing:0.08em; color:var(--ink-soft); margin-bottom:2px;
  }
  .chip{
    font-family:'Inter',sans-serif; font-size:12px; font-weight:500;
    padding:6px 10px; border-radius:3px; border:1px solid var(--line);
    background:var(--paper); cursor:pointer; text-align:left;
    display:flex; align-items:center; gap:7px;
  }
  .chip.active{ border-color:var(--ink); background:var(--white); font-weight:600; }
  .dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }

  /* Legend / status key, bottom left */
  .legend{
    position:absolute; bottom:20px; left:20px; z-index:1000;
    background:var(--white); border:1.5px solid var(--ink); border-radius:4px;
    padding:10px 12px; font-family:'JetBrains Mono', monospace; font-size:10.5px;
    color:var(--ink-soft); box-shadow:2px 2px 0 rgba(43,42,38,0.15);
    max-width:210px; line-height:1.6;
  }
  .legend .row{ display:flex; align-items:center; gap:7px; }
  .badge{
    display:inline-block; padding:1px 6px; border-radius:2px; font-weight:700;
    font-size:9.5px; text-transform:uppercase; letter-spacing:0.04em;
  }
  .badge.verified{ background:var(--moss); color:var(--white); }
  .badge.unverified{ background:var(--amber); color:var(--white); }

  /* Popup styling */
  .leaflet-popup-content-wrapper{
    background:var(--white); border:1.5px solid var(--ink); border-radius:4px;
    box-shadow:3px 3px 0 rgba(43,42,38,0.18);
  }
  .leaflet-popup-tip{ background:var(--white); border:1.5px solid var(--ink); }
  .leaflet-popup-content{ margin:14px 16px; font-family:'Inter',sans-serif; width:230px !important; }
  .pop-name{ font-family:'Fraunces',serif; font-weight:600; font-size:16px; margin:0 0 4px; }
  .pop-meta{ font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--ink-soft); margin-bottom:8px; }
  .pop-notes{ font-size:12.5px; color:var(--ink); margin-bottom:10px; line-height:1.5; }
  .pop-actions{ display:flex; gap:6px; flex-wrap:wrap; }
  .pop-btn{
    font-family:'JetBrains Mono', monospace; font-size:10.5px; font-weight:700;
    padding:5px 8px; border-radius:2px; border:1px solid var(--ink); cursor:pointer;
    background:var(--paper); text-decoration:none; color:var(--ink); text-transform:uppercase;
  }
  .pop-btn.confirm{ background:var(--moss); color:var(--white); border-color:var(--moss); }
  .pop-btn.confirm:hover{ background:#3B5540; }
  .pop-btn:hover{ background:var(--ink); color:var(--white); }

  /* Suggest-a-stop modal */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(43,42,38,0.45); z-index:2000;
    display:none; align-items:center; justify-content:center;
  }
  .modal-backdrop.open{ display:flex; }
  .modal{
    background:var(--white); border:2px solid var(--ink); border-radius:5px;
    padding:24px; width:min(360px, 90vw); box-shadow:5px 5px 0 rgba(43,42,38,0.2);
  }
  .modal h2{ font-family:'Fraunces',serif; font-size:19px; margin:0 0 6px; }
  .modal p{ font-size:13px; color:var(--ink-soft); line-height:1.5; margin:0 0 16px; }
  .modal .btn{ width:100%; justify-content:center; }
</style>
</head>
<body>

<div id="map"></div>

<div class="topbar">
  <div class="brand">
    <span class="paw">🐾</span>
    <div>
      <h1>Columbus Dog Treat Trail</h1>
      <div class="subtitle">Stashes spotted on foot — v0.1 (seed)</div>
    </div>
  </div>
  <div class="actions">
    <button class="btn" id="locate-btn">📍 Near me</button>
    <button class="btn primary" id="suggest-btn">+ Suggest a stop</button>
  </div>
</div>

<div class="filters" id="filters">
  <div class="label">Show</div>
  <!-- chips injected by JS -->
</div>

<div class="legend">
  <div class="row"><span class="badge verified">Verified</span> confirmed on foot</div>
  <div class="row" style="margin-top:4px;"><span class="badge unverified">Unverified</span> reported, not yet checked</div>
</div>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2>Suggest a stop</h2>
    <p id="modal-copy">Seen a treat stand, stick library, water bowl, or toy box on a walk? Tell us where — we'll verify it on foot before it goes live.</p>
    <a class="btn primary" id="modal-cta" href="#" target="_blank" rel="noopener">Open the form →</a>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
  /* =========================================================
     CONFIG
     -----------------------------------------------------------
     1. SHEET_CSV_URL: publish the "Stops" tab of the data sheet
        to the web as CSV (File > Share > Publish to web > pick
        the Stops tab > CSV) and paste that URL here.
     2. FORM_URL: the shareable link for the "Suggest a stop"
        Google Form (Send > link icon). Its responses should
        land in a separate "Submissions" tab in the same sheet —
        NOT the Stops tab — so nothing goes live unverified.
     Leave either blank to fall back to local seed data / the
     old disabled-form message, so the site still works before
     these are wired up. See SETUP.md for the full walkthrough.
     ========================================================= */
  const CONFIG = {
    SHEET_CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRConYdz281L3B8jXoR6ocsHiHzox0rLsPauOPp3uTj9OWjNj2l1lHhGBp4X3Zo56LK0UaoXd4R5ulB/pub?gid=0&single=true&output=csv",
    FORM_URL: "https://docs.google.com/forms/d/e/1FAIpQLSduyp92-tJt_xq7tdGpfLV-ERWM8hwAXQV95OAqqAdJn3SPNQ/viewform"
  };

  /* =========================================================
     DATA — fallback seed
     -----------------------------------------------------------
     Used only if SHEET_CSV_URL is blank or the fetch fails, so
     the map never shows up empty. Shape:

     {
       id, name, lat, lng,
       type: 'treat_stand' | 'stick_library' | 'water_bowl' | 'toy_box' | 'mixed',
       neighborhood, status: 'verified' | 'unverified',
       notes, submitted_by, date_added
     }
     ========================================================= */
  const SEED_STOPS = [
    {
      id: 1,
      name: "German Village biscuit stash (unconfirmed spot)",
      lat: 39.9469,
      lng: -82.9934,
      type: "treat_stand",
      neighborhood: "German Village",
      status: "unverified",
      notes: "Spotted on a dog-walking route — exact address still needs confirming on foot. Update coordinates once located.",
      submitted_by: "Steven",
      date_added: "2026-07-16"
    }
  ];

  let stops = SEED_STOPS;

  // Parses the published CSV into the same shape as SEED_STOPS,
  // coercing lat/lng to numbers and dropping malformed rows.
  function csvToStops(csvText) {
    const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
    return parsed.data
      .map(row => ({
        id: row.id,
        name: (row.name || "").trim(),
        lat: parseFloat(row.lat),
        lng: parseFloat(row.lng),
        type: (row.type || "").trim(),
        neighborhood: (row.neighborhood || "").trim(),
        status: (row.status || "unverified").trim(),
        notes: row.notes || "",
        submitted_by: row.submitted_by || "",
        date_added: row.date_added || ""
      }))
      .filter(s => s.name && Number.isFinite(s.lat) && Number.isFinite(s.lng) && TYPE_META_KEYS.includes(s.type));
  }

  async function loadStops() {
    if (!CONFIG.SHEET_CSV_URL) return SEED_STOPS;
    try {
      const res = await fetch(CONFIG.SHEET_CSV_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`Sheet fetch failed: ${res.status}`);
      const text = await res.text();
      const parsedStops = csvToStops(text);
      return parsedStops.length ? parsedStops : SEED_STOPS;
    } catch (err) {
      console.warn("Falling back to seed data — couldn't load the Sheet:", err);
      return SEED_STOPS;
    }
  }

  const TYPE_META = {
    treat_stand:   { label: "Treat stand",   color: "#B5502C" },
    stick_library: { label: "Stick library", color: "#4C6B4F" },
    water_bowl:    { label: "Water bowl",     color: "#3E6E8E" },
    toy_box:       { label: "Toy box",        color: "#8A5FB0" },
    mixed:         { label: "Mixed",          color: "#C68A2E" }
  };
  const TYPE_META_KEYS = Object.keys(TYPE_META);

  const map = L.map('map', { zoomControl: false }).setView([39.9469, -82.9934], 15);
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);

  let activeTypes = new Set(Object.keys(TYPE_META));
  let markers = [];

  function makeIcon(type, status) {
    const color = TYPE_META[type]?.color || "#B5502C";
    const ring = status === "verified" ? "#4C6B4F" : "#C68A2E";
    return L.divIcon({
      className: '',
      html: `<div style="
        width:22px;height:22px;border-radius:50%;
        background:${color}; border:3px solid ${ring};
        box-shadow:1px 1px 0 rgba(43,42,38,0.3);
      "></div>`,
      iconSize: [22, 22],
      iconAnchor: [11, 11]
    });
  }

  function popupHTML(stop) {
    const meta = TYPE_META[stop.type] || { label: stop.type };
    const badge = stop.status === "verified"
      ? '<span class="badge verified">Verified</span>'
      : '<span class="badge unverified">Unverified</span>';
    return `
      <div class="pop-name">${stop.name}</div>
      <div class="pop-meta">${meta.label} · ${stop.neighborhood} · ${badge}</div>
      <div class="pop-notes">${stop.notes || ""}</div>
      <div class="pop-actions">
        <a class="pop-btn" target="_blank" href="https://www.google.com/maps/dir/?api=1&destination=${stop.lat},${stop.lng}">Directions</a>
        ${stop.status !== "verified" ? `<button class="pop-btn confirm" data-confirm="${stop.id}">Mark verified</button>` : ""}
      </div>
    `;
  }

  function render() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    stops
      .filter(s => activeTypes.has(s.type))
      .forEach(stop => {
        const marker = L.marker([stop.lat, stop.lng], { icon: makeIcon(stop.type, stop.status) })
          .addTo(map)
          .bindPopup(popupHTML(stop));
        marker.on('popupopen', () => {
          const btn = document.querySelector(`[data-confirm="${stop.id}"]`);
          if (btn) {
            btn.addEventListener('click', () => {
              stop.status = "verified";
              marker.setIcon(makeIcon(stop.type, stop.status));
              marker.setPopupContent(popupHTML(stop));
              // Note: this is in-memory only for this session, just
              // a quick visual preview. To persist it, update the
              // matching row's `status` to "verified" (and correct
              // lat/lng if needed) in the Stops sheet — the next
              // page load will pick it up from there.
            });
          }
        });
        markers.push(marker);
      });
  }

  // Filter chips
  const filtersEl = document.getElementById('filters');
  Object.entries(TYPE_META).forEach(([key, meta]) => {
    const chip = document.createElement('button');
    chip.className = 'chip active';
    chip.innerHTML = `<span class="dot" style="background:${meta.color}"></span>${meta.label}`;
    chip.addEventListener('click', () => {
      if (activeTypes.has(key)) {
        activeTypes.delete(key);
        chip.classList.remove('active');
      } else {
        activeTypes.add(key);
        chip.classList.add('active');
      }
      render();
    });
    filtersEl.appendChild(chip);
  });

  loadStops().then(loaded => {
    stops = loaded;
    render();
  });

  // Suggest-a-stop modal content: point at the real Form once
  // configured, otherwise show the original "not set up yet" copy.
  const modalCopy = document.getElementById('modal-copy');
  const modalCta = document.getElementById('modal-cta');
  if (CONFIG.FORM_URL) {
    modalCta.href = CONFIG.FORM_URL;
  } else {
    modalCopy.textContent = "This is a seed build — the submission form isn't wired up yet. For now, email the spot (address or cross-streets + what you saw) and it'll get added to the sheet directly.";
    modalCta.href = "mailto:sjneedham@icloud.com?subject=Dog%20Treat%20Trail%20-%20New%20Stop&body=Location%20(address%20or%20cross-streets)%3A%0AType%20(treat%20stand%20%2F%20stick%20library%20%2F%20water%20bowl%20%2F%20toy%20box)%3A%0ANotes%3A%0A";
    modalCta.textContent = "Email a stop →";
  }

  // Near me
  document.getElementById('locate-btn').addEventListener('click', () => {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos => {
      const { latitude, longitude } = pos.coords;
      map.setView([latitude, longitude], 16);
      L.circleMarker([latitude, longitude], {
        radius: 8, color: '#2B2A26', weight: 2, fillColor: '#B5502C', fillOpacity: 1
      }).addTo(map);
    });
  });

  // Suggest-a-stop modal
  const modal = document.getElementById('modal');
  document.getElementById('suggest-btn').addEventListener('click', () => modal.classList.add('open'));
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('open'); });
</script>

</body>
</html>

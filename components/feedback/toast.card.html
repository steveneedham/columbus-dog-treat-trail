<script type="text/babel">
const { Toast } = window.ColumbusDogTreatTrailDesignSystem_791ae7;
function Demo(){
  const [k,setK]=React.useState('success');
  return <div style={{position:'absolute',inset:0}}>
    <div style={{display:'flex',gap:8,padding:20}}>
      <button onClick={()=>setK('success')}>success</button>
      <button onClick={()=>setK('error')}>error</button>
      <button onClick={()=>setK('info')}>info</button>
    </div>
    <Toast open kind={k} message={k==='success'?'Stop marked verified — thanks!':k==='error'?"Couldn't submit — try again":'Submission received, pending review'} onClose={()=>{}} />
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);

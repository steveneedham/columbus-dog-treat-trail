<!-- @dsCard group="Map App" viewport="1280x760" name="Profile & Leaderboard" subtitle="Intentional addition — contributor profile with avatar level progress, badges earned, and a community leaderboard" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile — Columbus Dog Treat Trail</title>
<link rel="stylesheet" href="../../styles.css">
<style>*{box-sizing:border-box}html,body{margin:0;background:var(--paper);font-family:var(--font-body);color:var(--ink)}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Brand, Panel, Button } = window.ColumbusDogTreatTrailDesignSystem_791ae7;

const LEADERBOARD = [
  { name: 'Maya R.', stops: 24, avatar: '../../assets/icons/avatars/avatar-04-tier3-crown.svg' },
  { name: 'Jordan P.', stops: 17, avatar: '../../assets/icons/avatars/avatar-04-tier2-collar.svg' },
  { name: 'You', stops: 6, avatar: '../../assets/icons/avatars/avatar-04.svg', me: true },
  { name: 'Sam K.', stops: 4, avatar: '../../assets/icons/avatars/avatar-02.svg' },
  { name: 'Alex T.', stops: 2, avatar: '../../assets/icons/avatars/avatar-07.svg' }
];
const BADGES = [
  { icon: '../../assets/icons/badges/badge-first-stop.svg', label: 'First stop', color: 'var(--moss)' },
  { icon: '../../assets/icons/badges/badge-streak.svg', label: '3-week streak', color: 'var(--rust)' },
  { icon: '../../assets/icons/badges/badge-explorer.svg', label: 'Explorer', color: 'var(--water,#3E6E8E)' }
];

function Page() {
  return (
    <div style={{ maxWidth: 640, margin: '0 auto', padding: '20px 24px 40px', display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <Brand subtitle="Your profile" logoSrc="../../assets/logo-lockup.svg" />
        <Button>Back to map</Button>
      </div>

      <Panel>
        <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
          <img src="../../assets/icons/avatars/avatar-04.svg" style={{ width: 64, height: 64 }} />
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 18 }}>You — Level 2</div>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10.5, color: 'var(--ink-soft)', marginTop: 2 }}>6 verified stops · 4 more to earn your collar</div>
            <div style={{ marginTop: 8, height: 8, borderRadius: 4, background: 'var(--paper-dark)', border: '1px solid var(--line)', overflow: 'hidden' }}>
              <div style={{ width: '60%', height: '100%', background: 'var(--rust)' }} />
            </div>
          </div>
        </div>
      </Panel>

      <Panel label="Badges earned">
        <div style={{ display: 'flex', gap: 20 }}>
          {BADGES.map(b => (
            <div key={b.label} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, color: b.color, fontFamily: 'var(--font-mono)', fontSize: 9.5, textAlign: 'center' }}>
              <img src={b.icon} style={{ width: 28, height: 28 }} />
              <span style={{ color: 'var(--ink-soft)' }}>{b.label}</span>
            </div>
          ))}
        </div>
      </Panel>

      <Panel label="Leaderboard — this month">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
          {LEADERBOARD.sort((a, b) => b.stops - a.stops).map((p, i) => (
            <div key={p.name} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 4px', borderBottom: i < LEADERBOARD.length - 1 ? '1px solid var(--paper-dark)' : 'none', background: p.me ? 'var(--paper)' : 'transparent', borderRadius: 3 }}>
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, width: 18, color: 'var(--ink-soft)' }}>{i + 1}</span>
              <img src={p.avatar} style={{ width: 30, height: 30 }} />
              <span style={{ flex: 1, fontWeight: p.me ? 700 : 500 }}>{p.name}</span>
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-soft)' }}>{p.stops} stops</span>
            </div>
          ))}
        </div>
      </Panel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#5B5648;text-align:center;padding:10px 14px 16px;background:#EDE6D6">© 2026 Steven Needham · Columbus Dog Treat Trail · fan-made, not affiliated with businesses shown</div></body>
</html>

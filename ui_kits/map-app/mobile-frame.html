<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile — Columbus Dog Treat Trail</title>
<link rel="stylesheet" href="../../styles.css">
<style>*{box-sizing:border-box}html,body{margin:0;background:var(--paper-dark);display:flex;align-items:center;justify-content:center;min-height:100%;font-family:var(--font-body)}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="./ios-frame.jsx"></script>
<script type="text/babel">
const { Button } = window.ColumbusDogTreatTrailDesignSystem_791ae7;
const { IOSDevice } = window;

const SCREENS = [
  { icon: '../../assets/icons/treat.svg', title: 'Find hidden stashes', body: 'Treat stands, stick libraries, water bowls, and toy boxes — spotted by neighbors on their daily walks.' },
  { icon: '../../assets/icons/map-pin.svg', title: 'Verified on foot', body: 'Every stop starts unverified until someone walks it and confirms it\u2019s really there.' },
  { icon: '../../assets/icons/avatars/avatar-04.svg', title: 'Level up your pup', body: 'Suggest and verify stops to earn a collar, then a crown — and climb the leaderboard.' }
];

function Screen() {
  const [step, setStep] = React.useState(0);
  const s = SCREENS[step];
  return (
    <div style={{ height: '100%', background: 'var(--paper)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'space-between', padding: '24px 22px 20px' }}>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 18, textAlign: 'center' }}>
        <div style={{ width: 68, height: 68, borderRadius: '50%', background: 'var(--white)', border: '2px solid var(--ink)', boxShadow: 'var(--shadow-md)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <img src={s.icon} style={{ width: 32, height: 32 }} />
        </div>
        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 19 }}>{s.title}</div>
        <div style={{ fontSize: 13, color: 'var(--ink-soft)', lineHeight: 1.5 }}>{s.body}</div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14, width: '100%' }}>
        <div style={{ display: 'flex', gap: 6 }}>
          {SCREENS.map((_, i) => <span key={i} style={{ width: i === step ? 16 : 6, height: 6, borderRadius: 4, background: i === step ? 'var(--rust)' : 'var(--line)' }} />)}
        </div>
        <Button variant="primary" onClick={() => setStep(step < SCREENS.length - 1 ? step + 1 : 0)}>{step < SCREENS.length - 1 ? 'Next' : 'Start exploring'}</Button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<IOSDevice title=""><Screen /></IOSDevice>);
</script>
</body>
</html>

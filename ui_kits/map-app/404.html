<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lost the trail — Columbus Dog Treat Trail</title>
<link rel="stylesheet" href="../../styles.css">
<style>*{box-sizing:border-box}html,body{margin:0;background:var(--paper);font-family:var(--font-body);color:var(--ink)}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Brand, Button } = window.ColumbusDogTreatTrailDesignSystem_791ae7;
function Page(){
  return (
    <div style={{maxWidth:420,margin:'0 auto',padding:'20px 24px 48px',display:'flex',flexDirection:'column',gap:22}}>
      <Brand subtitle="404" logoSrc="../../assets/logo-lockup.svg" />
      <div style={{background:'var(--white)',border:'1.5px solid var(--ink)',borderRadius:4,boxShadow:'var(--shadow-md)',padding:'36px 28px',display:'flex',flexDirection:'column',alignItems:'center',gap:16,textAlign:'center',marginTop:20}}>
        <img src="../../assets/mascot/scout-confused.svg" onError={(e)=>{e.target.style.display='none'}} style={{width:96,height:96}} />
        <div style={{fontFamily:'var(--font-mono)',fontSize:12,fontWeight:700,letterSpacing:'0.08em',color:'var(--ink-soft)'}}>ERROR 404</div>
        <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:24,lineHeight:1.25}}>Scout lost the trail here.</div>
        <div style={{fontSize:14,lineHeight:1.6,color:'var(--ink-soft)'}}>This stop, page, or link doesn't exist — maybe it moved, maybe it was never verified. Let's get you back on the path.</div>
        <div style={{display:'flex',gap:10,marginTop:6}}>
          <Button variant="primary">← Back to the map</Button>
          <Button>Suggest a stop</Button>
        </div>
      </div>
      <div style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--ink-soft)',textAlign:'center'}}>Columbus Dog Treat Trail</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
<div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#5B5648;text-align:center;padding:10px 14px 16px;background:#EDE6D6">© 2026 Steven Needham · Columbus Dog Treat Trail · fan-made, not affiliated with businesses shown</div></body>
</html>

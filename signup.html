  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

splay: swap;\n  src: url(\"cd93320f-e717-4f31-94b3-e43376b43edd\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"236dc8e7-13c2-4d30-a537-33c35462f54a\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"430f0c98-0432-4465-b190-c13feb1edf4e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n:root{\n  --font-display:'Fraunces',serif;         /* stop names, headings, modal titles — warm, editorial serif */\n  --font-body:'Inter',sans-serif;          /* buttons, body copy, chip labels */\n  --font-mono:'JetBrains Mono',monospace;  /* eyebrow labels, meta, badges, legend — field-notebook feel */\n\n  --text-display-lg:26px;   /* logo wordmark / big headings */\n  --text-display-md:19px;   /* modal h2 */\n  --text-display-sm:16px;   /* popup stop name */\n  --text-body:13px;         /* buttons, chip labels */\n  --text-body-sm:12.5px;    /* popup notes */\n  --text-mono-label:11px;   /* subtitle/eyebrow */\n  --text-mono-meta:10.5px;  /* popup meta, legend */\n  --text-mono-badge:9.5px;  /* status badges */\n\n  --leading-tight:1.2;\n  --leading-normal:1.5;\n  --leading-loose:1.6;\n\n  --tracking-wide:0.08em;   /* uppercase mono labels */\n  --tracking-mid:0.04em;    /* badges */\n}\n\n:root{\n  --space-1:4px;\n  --space-2:6px;\n  --space-3:8px;\n  --space-4:10px;\n  --space-5:12px;\n  --space-6:14px;\n  --space-7:16px;\n  --space-8:20px;\n  --space-9:24px;\n\n  --radius-sm:2px;\n  --radius-md:3px;\n  --radius-lg:4px;\n  --radius-xl:5px;\n\n  --border-thin:1px;\n  --border-default:1.5px;\n  --border-thick:2px;\n}\n\n:root{\n  /* hard offset shadows — no blur, no softness. this is the brand's signature depth cue,\n     standing in for the \"carved sign\" / paper-craft feel instead of soft drop shadows. */\n  --shadow-sm:2px 2px 0 rgba(43,42,38,0.15);\n  --shadow-md:3px 3px 0 rgba(43,42,38,0.18);\n  --shadow-lg:5px 5px 0 rgba(43,42,38,0.2);\n\n  --ease-standard:ease; /* @kind other */\n  --duration-fast:0.12s; /* @kind other */\n\n  --backdrop-scrim:rgba(43,42,38,0.45);\n}\n\n<\u002Fstyle>\n  <script src=\"fb03cd87-1845-4108-bedd-2d20855c6ec0\"><\u002Fscript>\n  <style>\n    body{margin:0}\n    a{color:var(--rust);text-decoration:none}\n    a:hover{color:var(--rust-dark);text-decoration:underline}\n    input:focus,select:focus{outline:2px solid var(--ink);outline-offset:1px}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex;min-height:100vh;background:var(--paper);font-family:var(--font-body);color:var(--ink)\">\n\n  <div style=\"flex:1 1 46%;background:var(--paper-dark);border-right:var(--border-thick) solid var(--ink);display:flex;flex-direction:column;justify-content:center;padding:64px;position:relative;overflow:hidden\">\n    <img src=\"a9c1f68c-c2db-49f9-97dc-75a3ac49818a\" style=\"position:absolute;right:-60px;bottom:-60px;width:340px;height:340px;opacity:0.08;pointer-events:none\">\n    <div style=\"max-width:380px;position:relative;z-index:1\">\n      <x-import component-from-global-scope=\"ColumbusDogTreatTrailDesignSystem_791ae7.Brand\" subtitle=\"Stashes spotted on foot — v0.5\" hint-size=\"260px,60px\"><\u002Fx-import>\n      <h1 style=\"font-family:var(--font-display);font-weight:600;font-size:32px;line-height:var(--leading-tight);margin:28px 0 14px\">{{ tagline }}<\u002Fh1>\n      <p style=\"font-family:var(--font-body);font-size:var(--text-body);color:var(--ink-soft);line-height:var(--leading-normal);margin:0 0 24px\">This whole map is hand-built and run by one person, so an account here is a small, honest thing — no ads, no data games, just a way to keep track of your own finds.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <div style=\"display:flex;align-items:baseline;gap:9px\">\n          <span style=\"font-family:var(--font-mono);font-size:var(--text-mono-meta);color:var(--moss);font-weight:700\">✓<\u002Fspan>\n          <span style=\"font-family:var(--font-mono);font-size:var(--text-mono-meta);letter-spacing:var(--tracking-wide);text-transform:uppercase;color:var(--ink-soft)\">{{ bullet1 }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:9px\">\n          <span style=\"font-family:var(--font-mono);font-size:var(--text-mono-meta);color:var(--moss);font-weight:700\">✓<\u002Fspan>\n          <span style=\"font-family:var(--font-mono);font-size:var(--text-mono-meta);letter-spacing:var(--tracking-wide);text-transform:uppercase;color:var(--ink-soft)\">{{ bullet2 }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex:1 1 54%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 32px;position:relative\">\n    <a href=\"#\" style=\"position:absolute;top:28px;left:32px;font-family:var(--font-mono);font-size:var(--text-mono-meta);letter-spacing:var(--tracking-wide);text-transform:uppercase;color:var(--ink-soft)\">← Back to the map<\u002Fa>\n\n    <div style=\"width:100%;max-width:360px;background:var(--white);border:var(--border-default) solid var(--ink);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:32px\">\n\n      <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;padding:12px 0\">\n          <div style=\"font-size:34px;color:var(--moss);margin-bottom:10px\">✓<\u002Fdiv>\n          <h2 style=\"font-family:var(--font-display);font-weight:600;font-size:19px;margin:0 0 10px\">You're in, {{ firstName }}.<\u002Fh2>\n          <p style=\"font-family:var(--font-body);font-size:var(--text-body-sm);color:var(--ink-soft);line-height:var(--leading-normal);margin:0\">We just need to confirm it's really you — check <strong style=\"color:var(--ink)\">{{ email }}<\u002Fstrong> for a link.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <div style=\"font-family:var(--font-mono);font-size:var(--text-mono-label);letter-spacing:var(--tracking-wide);text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px\">Join the trail<\u002Fdiv>\n          <h2 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;margin:0 0 6px\">Create your account<\u002Fh2>\n          <p style=\"font-family:var(--font-body);font-size:var(--text-body-sm);color:var(--ink-soft);margin:0 0 22px\">Takes about a minute. Really.<\u002Fp>\n\n          <form sc-camel-on-submit=\"{{ onSubmit }}\" style=\"display:flex;flex-direction:column;gap:16px\">\n\n            <div>\n              <label style=\"display:block;font-family:var(--font-mono);font-size:var(--text-mono-meta);letter-spacing:var(--tracking-mid);text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px\">Display name<\u002Flabel>\n              <input type=\"text\" value=\"{{ name }}\" sc-camel-on-change=\"{{ onChangeName }}\" sc-camel-on-blur=\"{{ onBlurName }}\" placeholder=\"e.g. Biscuit's Human\" style=\"width:100%;box-sizing:border-box;font-family:var(--font-body);font-size:var(--text-body);padding:9px 10px;border:var(--border-default) solid var(--ink);border-radius:var(--radius-md);background:var(--white);color:var(--ink)\">\n              <sc-if value=\"{{ nameError }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-family:var(--font-mono);font-size:var(--text-mono-badge);color:var(--rust);margin-top:4px\">{{ nameError }}<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ showNeighborhoodField }}\" hint-placeholder-val=\"{{ true }}\">\n              <div>\n                <label style=\"display:block;font-family:var(--font-mono);font-size:var(--text-mono-meta);letter-spacing:var(--tracking-mid);text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px\">Neighborhood <span style=\"opacity:0.6\">(optional)<\u002Fspan><\u002Flabel>\n                <sc-raw-select value=\"{{ neighborhood }}\" sc-camel-on-change=\"{{ onChangeNeighborhood }}\" style=\"width:100%;box-sizing:border-box;font-family:var(--font-body);font-size:var(--text-body);padding:9px 10px;border:var(--border-default) solid var(--ink);border-radius:var(--radius-md);background:var(--white);color:var(--ink)\">\n                  <option value=\"\">Pick one, or skip it<\u002Foption>\n                  <option value=\"German Village\">German Village<\u002Foption>\n                  <option value=\"Clintonville\">Clintonville<\u002Foption>\n                  <option value=\"Short North\">Short North<\u002Foption>\n                  <option value=\"Olde Towne East\">Olde Towne East<\u002Foption>\n                  <option value=\"Grandview\">Grandview<\u002Foption>\n                  <option value=\"Other\">Somewhere else<\u002Foption>\n                <\u002Fsc-raw-select>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div>\n              <label style=\"display:block;font-family:var(--font-mono);font-size:var(--text-mono-meta);letter-spacing:var(--tracking-mid);text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px\">Email<\u002Flabel>\n              <input type=\"email\" value=\"{{ email }}\" sc-camel-on-change=\"{{ onChangeEmail }}\" sc-camel-on-blur=\"{{ onBlurEmail }}\" placeholder=\"you@example.com\" style=\"width:100%;box-sizing:border-box;font-family:var(--font-body);font-size:var(--text-body);padding:9px 10px;border:var(--border-default) solid var(--ink);border-radius:var(--radius-md);background:var(--white);color:var(--ink)\">\n              <sc-if value=\"{{ emailError }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-family:var(--font-mono);font-size:var(--text-mono-badge);color:var(--rust);margin-top:4px\">{{ emailError }}<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n\n            <div>\n              <label style=\"display:block;font-family:var(--font-mono);font-size:var(--text-mono-meta);letter-spacing:var(--tracking-mid);text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px\">Password<\u002Flabel>\n              <input type=\"password\" value=\"{{ password }}\" sc-camel-on-change=\"{{ onChangePassword }}\" sc-camel-on-blur=\"{{ onBlurPassword }}\" placeholder=\"At least 8 characters\" style=\"width:100%;box-sizing:border-box;font-family:var(--font-body);font-size:var(--text-body);padding:9px 10px;border:var(--border-default) solid var(--ink);border-radius:var(--radius-md);background:var(--white);color:var(--ink)\">\n              <sc-if value=\"{{ showPasswordMeter }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;gap:4px;margin-top:6px\">\n                  <div style=\"height:3px;flex:1;border-radius:2px;background:{{ bar1Color }}\"><\u002Fdiv>\n                  <div style=\"height:3px;flex:1;border-radius:2px;background:{{ bar2Color }}\"><\u002Fdiv>\n                  <div style=\"height:3px;flex:1;border-radius:2px;background:{{ bar3Color }}\"><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-family:var(--font-mono);font-size:var(--text-mono-badge);letter-spacing:var(--tracking-mid);text-transform:uppercase;color:{{ strengthColor }};margin-top:4px\">{{ strengthLabel }}<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ passwordError }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-family:var(--font-mono);font-size:var(--text-mono-badge);color:var(--rust);margin-top:4px\">{{ passwordError }}<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n\n            <x-import component-from-global-scope=\"ColumbusDogTreatTrailDesignSystem_791ae7.Button\" variant=\"primary\" type=\"submit\" disabled=\"{{ submitDisabled }}\" hint-size=\"100%,40px\" style=\"width:100%;justify-content:center\">Create account<\u002Fx-import>\n\n            <sc-if value=\"{{ showGoogle }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;align-items:center;gap:10px;margin:2px 0\">\n                <div style=\"flex:1;height:1px;background:var(--line)\"><\u002Fdiv>\n                <span style=\"font-family:var(--font-mono);font-size:var(--text-mono-badge);letter-spacing:var(--tracking-mid);text-transform:uppercase;color:var(--ink-soft)\">or<\u002Fspan>\n                <div style=\"flex:1;height:1px;background:var(--line)\"><\u002Fdiv>\n              <\u002Fdiv>\n              <x-import component-from-global-scope=\"ColumbusDogTreatTrailDesignSystem_791ae7.Button\" variant=\"default\" type=\"button\" hint-size=\"100%,40px\" style=\"width:100%;justify-content:center\">Continue with Google →<\u002Fx-import>\n            <\u002Fsc-if>\n\n          <\u002Fform>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:800},&quot;emphasis&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;both&quot;,&quot;options&quot;:[&quot;save&quot;,&quot;submit&quot;,&quot;both&quot;],&quot;tsType&quot;:&quot;'save'|'submit'|'both'&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;authMethods&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;emailAndGoogle&quot;,&quot;options&quot;:[&quot;emailOnly&quot;,&quot;emailAndGoogle&quot;],&quot;tsType&quot;:&quot;'emailOnly'|'emailAndGoogle'&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;showNeighborhood&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Behavior&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    name: '', email: '', password: '', neighborhood: '',\n    touchedName: false, touchedEmail: false, touchedPassword: false,\n    submitted: false\n  };\n\n  onChangeName = e => this.setState({ name: e.target.value });\n  onChangeEmail = e => this.setState({ email: e.target.value });\n  onChangePassword = e => this.setState({ password: e.target.value });\n  onChangeNeighborhood = e => this.setState({ neighborhood: e.target.value });\n  onBlurName = () => this.setState({ touchedName: true });\n  onBlurEmail = () => this.setState({ touchedEmail: true });\n  onBlurPassword = () => this.setState({ touchedPassword: true });\n\n  onSubmit = e => {\n    e.preventDefault();\n    this.setState({ touchedName: true, touchedEmail: true, touchedPassword: true });\n    if (this.isValid()) this.setState({ submitted: true });\n  };\n\n  emailValid() { return /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(this.state.email); }\n  isValid() { return this.state.name.trim().length > 0 && this.emailValid() && this.state.password.length >= 8; }\n\n  passwordScore() {\n    const p = this.state.password;\n    if (!p) return 0;\n    let score = 0;\n    if (p.length >= 8) score++;\n    if (/[0-9]/.test(p) && /[a-zA-Z]/.test(p)) score++;\n    if (p.length >= 12 && /[^a-zA-Z0-9]/.test(p)) score++;\n    return score;\n  }\n\n  renderVals() {\n    const emphasis = this.props.emphasis ?? 'both';\n    const taglineMap = {\n      save: 'Keep a list of your favorite stops.',\n      submit: 'Spot a stash? Add it to the map.',\n      both: 'Save your favorite stops, add ones you spot.'\n    };\n    const bullets = {\n      save: ['Bookmark stops you want to revisit', 'Get a heads-up on ones nearby'],\n      submit: ['Submit a stop in under a minute', 'Get credit when it\\u2019s verified'],\n      both: ['Save the stops you love', 'Add ones you spot on a walk']\n    };\n    const b = bullets[emphasis] || bullets.both;\n\n    const score = this.passwordScore();\n    const strengthLabel = ['Too short', 'Weak', 'Fair', 'Strong'][score];\n    const strengthColor = ['var(--rust)', 'var(--rust)', 'var(--amber)', 'var(--moss)'][score];\n    const barColor = i => score >= i ? strengthColor : 'var(--line)';\n\n    const nameError = this.state.touchedName && this.state.name.trim().length === 0 ? 'A name would help.' : '';\n    const emailError = this.state.touchedEmail && !this.emailValid() ? 'That email doesn\\u2019t look right.' : '';\n    const passwordError = this.state.touchedPassword && this.state.password.length > 0 && this.state.password.length < 8 ? 'Needs at least 8 characters.' : '';\n\n    return {\n      name: this.state.name, email: this.state.email, password: this.state.password, neighborhood: this.state.neighborhood,\n      onChangeName: this.onChangeName, onChangeEmail: this.onChangeEmail, onChangePassword: this.onChangePassword, onChangeNeighborhood: this.onChangeNeighborhood,\n      onBlurName: this.onBlurName, onBlurEmail: this.onBlurEmail, onBlurPassword: this.onBlurPassword, onSubmit: this.onSubmit,\n      submitted: this.state.submitted, notSubmitted: !this.state.submitted,\n      firstName: (this.state.name.trim().split(' ')[0]) || 'friend',\n      nameError, emailError, passwordError,\n      showPasswordMeter: this.state.password.length > 0,\n      bar1Color: barColor(1), bar2Color: barColor(2), bar3Color: barColor(3),\n      strengthLabel, strengthColor,\n      submitDisabled: !this.isValid(),\n      showNeighborhoodField: this.props.showNeighborhood ?? true,\n      showGoogle: (this.props.authMethods ?? 'emailAndGoogle') === 'emailAndGoogle',\n      tagline: taglineMap[emphasis] || taglineMap.both,\n      bullet1: b[0], bullet2: b[1]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"

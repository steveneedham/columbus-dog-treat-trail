<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- ears: cream, same tone as the head, long floppy paddles hanging past the jaw -->
  <path d="M68,58 C40,65 20,100 30,135 C36,150 55,155 65,140 C72,128 68,95 68,75 Z"
        fill="#F7F4EC" stroke="#2B2A26" stroke-width="5" stroke-linejoin="round"/>
  <path d="M132,58 C160,65 180,100 170,135 C164,150 145,155 135,140 C128,128 132,95 132,75 Z"
        fill="#F7F4EC" stroke="#2B2A26" stroke-width="5" stroke-linejoin="round"/>
  <!-- alert/happy motion lines -->
  <path d="M150,58 L165,48" stroke="#2B2A26" stroke-width="3" stroke-linecap="round"/>
  <path d="M156,67 L172,60" stroke="#2B2A26" stroke-width="3" stroke-linecap="round"/>
  <path d="M148,73 L162,68" stroke="#2B2A26" stroke-width="3" stroke-linecap="round"/>
  <!-- head -->
  <circle cx="100" cy="95" r="55" fill="#F7F4EC" stroke="#2B2A26" stroke-width="5"/>
  <!-- eyes -->
  <circle cx="80" cy="90" r="6" fill="#2B2A26"/>
  <circle cx="120" cy="90" r="6" fill="#2B2A26"/>
  <!-- nose -->
  <ellipse cx="100" cy="112" rx="9" ry="7" fill="#2B2A26"/>
  <!-- open happy mouth -->
  <path d="M80,120 Q100,133 120,120" fill="none" stroke="#2B2A26" stroke-width="4" stroke-linecap="round"/>
  <!-- tongue -->
  <path d="M92,122 Q100,142 108,122 Z" fill="#B5502C"/>
  <!-- bandana band -->
  <path d="M55,145 Q100,170 145,145 L138,158 Q100,178 62,158 Z"
        fill="#B5502C" stroke="#2B2A26" stroke-width="4" stroke-linejoin="round"/>
  <!-- bandana knot flap -->
  <path d="M89,160 L111,160 L100,183 Z" fill="#B5502C" stroke="#2B2A26" stroke-width="4" stroke-linejoin="round"/>
  <!-- paw print on the flap -->
  <ellipse cx="100" cy="174" rx="5" ry="6" fill="#FBF9F3"/>
  <circle cx="93" cy="166" r="2.4" fill="#FBF9F3"/>
  <circle cx="100" cy="163" r="2.4" fill="#FBF9F3"/>
  <circle cx="107" cy="166" r="2.4" fill="#FBF9F3"/>
</svg>

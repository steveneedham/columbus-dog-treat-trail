  <ellipse cx="93" cy="248" rx="17" ry="13" fill="#F7F4EC" stroke="#2B2A26" stroke-width="4"/>
  <ellipse cx="147" cy="248" rx="17" ry="13" fill="#F7F4EC" stroke="#2B2A26" stroke-width="4"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260">
  <!-- tail: short, low, gentle upward curl at the tip only — not an over-the-back plume -->
  <path d="M172,182 C196,192 212,176 206,155 C203,142 189,144 185,155 C190,163 186,176 172,182 Z"
        fill="#B5502C" stroke="#2B2A26" stroke-width="4" stroke-linejoin="round"/>
  <!-- haunches / body -->
  <ellipse cx="120" cy="200" rx="60" ry="52" fill="#B5502C" stroke="#2B2A26" stroke-width="4"/>
  <!-- chest patch -->
  <ellipse cx="120" cy="211" rx="27" ry="38" fill="#F7F4EC"/>
  <!-- front paws -->
  <ellipse cx="93" cy="251" rx="17" ry="13" fill="#F7F4EC" stroke="#2B2A26" stroke-width="4"/>
  <ellipse cx="147" cy="251" rx="17" ry="13" fill="#F7F4EC" stroke="#2B2A26" stroke-width="4"/>
  <!-- ears: long floppy hound ears hanging down past the jaw -->
  <path d="M89,76 C69,82 56,112 61,148 C64,168 79,180 91,169 C97,161 94,129 92,109 C91,94 90,84 89,76 Z"
        fill="#4C6B4F" stroke="#2B2A26" stroke-width="4" stroke-linejoin="round"/>
  <path d="M151,76 C171,82 184,112 179,148 C176,168 161,180 149,169 C143,161 146,129 148,109 C149,94 150,84 151,76 Z"
        fill="#4C6B4F" stroke="#2B2A26" stroke-width="4" stroke-linejoin="round"/>
  <!-- head -->
  <circle cx="120" cy="103" r="45" fill="#B5502C" stroke="#2B2A26" stroke-width="4"/>
  <!-- muzzle: longer and more prominent so it reads as a dog snout, not a rodent face -->
  <ellipse cx="120" cy="144" rx="26" ry="25" fill="#F7F4EC" stroke="#2B2A26" stroke-width="3"/>
  <!-- bandana band -->
  <path d="M76,153 Q120,176 164,153 L158,168 Q120,186 82,168 Z"
        fill="#C68A2E" stroke="#2B2A26" stroke-width="3" stroke-linejoin="round"/>
  <!-- bandana knot flap -->
  <path d="M111,170 L129,170 L120,196 Z" fill="#C68A2E" stroke="#2B2A26" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="120" cy="171" r="4" fill="#2B2A26"/>
  <!-- nose -->
  <ellipse cx="120" cy="131" rx="7.5" ry="5.5" fill="#2B2A26"/>
  <!-- mouth -->
  <path d="M105,151 Q120,161 135,151" fill="none" stroke="#2B2A26" stroke-width="3" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="100" cy="94" r="5.5" fill="#2B2A26"/>
  <circle cx="140" cy="94" r="5.5" fill="#2B2A26"/>
  <!-- brows -->
  <path d="M91,82 Q100,77 109,83" fill="none" stroke="#2B2A26" stroke-width="3" stroke-linecap="round"/>
  <path d="M131,83 Q140,77 149,82" fill="none" stroke="#2B2A26" stroke-width="3" stroke-linecap="round"/>
</svg>
